version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "${NGINX_PORT:-80}:80"
    
    # ✅ THIS IS THE KEY FIX - Pass .env variables to container!
    environment:
      - NGINX_PORT=${NGINX_PORT:-80}
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - SITE1_PORT=${SITE1_PORT:-80}
      - SITE2_PORT=${SITE2_PORT:-80}
    
    depends_on:
      - site1
      - site2
    networks:
      - app-network
    restart: unless-stopped

  site1:
    build: ./site1
    container_name: site1
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped

  site2:
    build: ./site2
    container_name: site2
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge