version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "${NGINX_PORT:-80}:80"
    environment:
      - NGINX_PORT=${NGINX_PORT:-80}
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - SITE1_PORT=${SITE1_PORT:-80}
      - SITE2_PORT=${SITE2_PORT:-80}
    depends_on:
      - site1
      - site2
    networks:
      - app-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  site1:
    build:
      context: ./site1
      dockerfile: Dockerfile
    container_name: site1
    expose:
      - "${SITE1_PORT:-80}"
    networks:
      - app-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  site2:
    build:
      context: ./site2
      dockerfile: Dockerfile
    container_name: site2
    expose:
      - "${SITE2_PORT:-80}"
    networks:
      - app-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge